                    "surface-container-lowest": "#ffffff",

                    "background": "#f9f9f7",
                    "on-surface": "#1a1c1b",
                    "error": "#ba1a1a",
                    "primary-fixed": "#c8ead9",
                    "on-primary-fixed": "#012016",
                    "tertiary-fixed": "#ffdead",
                    "on-secondary-fixed-variant": "#5d4201",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f4f4f2"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",

            "spacing": {

    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-background text-on-surface font-body-md selection:bg-secondary-container selection:text-secondary">
        <div id="header"></div>
        <main id="main-content"></main>
        <div id="footer"></div>

        <script>
                async function loadPartial(id, path) {
                        const res = await fetch(path);
                        if (!res.ok) return;
                        const html = await res.text();
                        document.getElementById(id).innerHTML = html;
                }

                // load core partials, then load main script
                (async () => {
                        await loadPartial('header', 'partials/header.html');
                        // main content placeholders
                        await loadPartial('main-content', 'partials/hero.html');
                        // append products, mission, mascot, cta into main-content
                        const mainEl = document.getElementById('main-content');
                        const parts = ['partials/products.html', 'partials/mission.html', 'partials/mascot.html', 'partials/cta.html'];
                        for (const p of parts) {
                                const r = await fetch(p);
                                if (!r.ok) continue;
                                const t = await r.text();
                                const wrap = document.createElement('div');
                                wrap.innerHTML = t;
                                mainEl.appendChild(wrap);
                        }
                        await loadPartial('footer', 'partials/footer.html');
                        // now load main.js
                        const s = document.createElement('script');
                        s.src = 'main.js';
                        document.body.appendChild(s);
                })();
        </script>
</body></html>
